# AeroSpace configuration
# Colemak layout: h=m, j=n, k=e, l=o

# Start at login
start-at-login = true
after-login-command = []
after-startup-command = []

# Normalise opposite monitor orientations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focused window
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Default layout for new workspaces
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Gaps
[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.bottom     = 8
outer.top        = 8
outer.right      = 8

# Key mappings — main mode
[mode.main.binding]

# Focus window (Colemak: m=left, n=down, e=up, o=right)
alt-m = 'focus left'
alt-n = 'focus down'
alt-e = 'focus up'
alt-o = 'focus right'

# Move window
alt-shift-m = 'move left'
alt-shift-n = 'move down'
alt-shift-e = 'move up'
alt-shift-o = 'move right'

# Resize
alt-minus      = 'resize smart -50'
alt-equal      = 'resize smart +50'

# Layout
alt-slash      = 'layout tiles horizontal vertical'
alt-comma      = 'layout accordion horizontal vertical'

# Fullscreen
alt-f = 'fullscreen'

# Float / unfloat
alt-shift-f = 'layout floating tiling'

# Close window
alt-shift-q = 'close'

# Reload config
alt-shift-semicolon = 'reload-config'

# Enter service mode
alt-shift-s = 'mode service'

# Workspaces 1–9
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Move workspace to next/prev monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
alt-tab       = 'focus-workspace-previous'

# Service mode — for less common operations
[mode.service.binding]
esc        = 'mode main'
r          = ['flatten-workspace-tree', 'mode main']
backspace  = ['close-all-windows-but-current', 'mode main']

# Join with adjacent window (Colemak directions)
alt-shift-m = ['join-with left',  'mode main']
alt-shift-n = ['join-with down',  'mode main']
alt-shift-e = ['join-with up',    'mode main']
alt-shift-o = ['join-with right', 'mode main']
