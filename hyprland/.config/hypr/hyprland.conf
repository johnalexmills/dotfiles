# Catppuccin Mocha palette ($mauve, $base, etc.)
source = ~/.config/hypr/mocha.conf

# --- Autostart ---

exec-once = hyprctl setcursor catppuccin-mocha-dark-cursors 24
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = waybar & swaync & hyprpaper & hypridle
exec-once = wl-paste --watch cliphist store

# --- Monitors ---

monitor = ,preferred,auto,1.5

# --- Default applications ---

$terminal    = ghostty
$fileManager = thunar
$menu        = wofi --show drun

# --- XWayland scaling ---
# force_zero_scaling = true keeps XWayland apps crisp on fractional scale.
# XCURSOR_SIZE is set to (wayland cursor size * scale) = 24 * 1.5 = 36.

xwayland {
    force_zero_scaling = true
}

env = XCURSOR_SIZE,36
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_DPI_SCALE,1

# --- Input ---

input {
    # Two layouts: us-qwerty (default) and us-colemak. Toggle: Alt+Shift.
    kb_layout  = us,us
    kb_variant = ,colemak
    kb_options = ctrl:nocaps,grp:alt_shift_toggle

    resolve_binds_by_sym = true
    follow_mouse = 1
    accel_profile = flat
    sensitivity = 0
    natural_scroll = true

    touchpad {
        natural_scroll = true
    }
}

# --- Appearance ---

general {
    border_size = 3
    col.active_border = $mauve $flamingo 90deg
    col.inactive_border = $surface0
    resize_on_border = true
    gaps_in = 2
    gaps_out = 4
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 4

    blur {
        enabled = true
        size = 3
        passes = 1
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = 0xee1a1a1a
    }
}

# Subtle, snappy animations — match the catppuccin/typecraft feel
# without being so slow they get in the way.
animations {
    enabled = true

    bezier = easeOutQuint,  0.22, 1, 0.36, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = linear,        0, 0, 1, 1

    animation = windows,        1, 4, easeOutQuint, slide
    animation = windowsIn,      1, 4, easeOutQuint, slide
    animation = windowsOut,     1, 3, easeOutQuint, slide
    animation = windowsMove,    1, 3, easeOutQuint
    animation = fade,           1, 4, easeOutQuint
    animation = workspaces,     1, 4, easeOutQuint, slide
    animation = border,         1, 10, easeOutQuint
    animation = borderangle,    1, 50, linear, loop
}

dwindle {
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# --- Window / layer rules ---
# Syntax (0.55+): `windowrule = EFFECT [args], match:PROP value, match:...`
#                 `layerrule  = EFFECT value,   match:namespace NAME`

windowrule = suppress_event maximize, match:class .*
windowrule = float on, match:class ^(pavucontrol|nm-connection-editor|blueman-manager)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:title ^(Picture-in-Picture)$

layerrule = blur on,    match:namespace ^(waybar)$
layerrule = blur on,    match:namespace ^(swaync-control-center)$
layerrule = blur on,    match:namespace ^(swaync-notification-window)$
layerrule = no_anim on, match:namespace ^(wofi)$

# --- Keybinds ---

$mainMod = SUPER

# Launchers
bind = ALT,      space,  exec, $menu
bind = $mainMod, return, exec, $terminal
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, G,      exec, /usr/bin/steam

# Window management
bind = $mainMod,       C,          killactive,
bind = $mainMod,       V,          togglefloating,
bind = $mainMod,       F,          fullscreen,
bind = $mainMod,       P,          pseudo,
bind = $mainMod,       T,          layoutmsg, togglesplit
bind = $mainMod,       W,          togglegroup,
bindm = $mainMod,      mouse:272,  movewindow
bindm = $mainMod,      mouse:273,  resizewindow

# Focus (vim-style)
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Screenshots
bind = ,          Print, exec, hyprshot -m window
bind = SHIFT,     Print, exec, hyprshot -m region
bind = CTRL SHIFT, Print, exec, hyprshot -m region --clipboard-only

# Clipboard history
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --show dmenu | cliphist decode | wl-copy

# Wallpaper picker (wofi-driven; uses ~/.config/backgrounds/)
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/wallpaper.sh

# System
bind = $mainMod SHIFT, L,      exec, hyprlock
bind = $mainMod SHIFT, S,      exec, systemctl suspend
bind = $mainMod SHIFT, P,      exec, systemctl poweroff
bind = $mainMod SHIFT, R,      exec, systemctl reboot
bind = $mainMod SHIFT, period, exec, hyprctl reload
bind = $mainMod,       M,      exit,

# Media keys
bind = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
bind = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
bind = , XF86AudioMute,         exec, pactl set-sink-mute   @DEFAULT_SINK@ toggle
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
